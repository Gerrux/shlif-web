entryPoints:
  web:
    address: ":80"
providers:
  docker:
    exposedByDefault: false
  # Sandbox fallback: this environment's Docker Engine (29.1.3, MinAPIVersion 1.44)
  # rejects the API-1.24 calls Traefik's docker provider issues internally (reproduces
  # identically on traefik:v3.2 and traefik:v3.5.6 — see task-3-report.md). The docker
  # provider above is kept as-is for label-driven discovery on a normal Docker Engine;
  # this file provider supplies the same two routes statically so routing works here too.
  # Harmless to keep alongside a working docker provider: same rule/priority, same backends.
  file:
    filename: /etc/traefik/dynamic.yml
api:
  dashboard: false
log:
  level: INFO
