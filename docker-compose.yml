services:
  traefik:
    image: traefik:v3.2
    restart: unless-stopped
    command:
      - "--configFile=/etc/traefik/traefik.yml"
    ports:
      - "80:80"
    volumes:
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [shlif-net]

  api:
    build: ./backend
    restart: unless-stopped
    environment:
      - SHLIF_DATA_DIR=/app/data
      - SHLIF_MODELS_DIR=/app/models
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
    # exposes the host's NVIDIA L4 to the container (requires nvidia-container-toolkit
    # on the host); torch/talc_unet/ore_unet auto-detect cuda vs cpu at load time, so
    # this stays optional — the api still runs (on CPU) if the toolkit isn't present.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.priority=100"
      - "traefik.http.services.api.loadbalancer.server.port=8000"
    networks: [shlif-net]

  web:
    build: ./frontend
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=PathPrefix(`/`)"
      - "traefik.http.routers.web.entrypoints=web"
      - "traefik.http.routers.web.priority=1"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    networks: [shlif-net]

networks:
  shlif-net:
