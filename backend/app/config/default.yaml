# Дизайн-система «Шлиф» — конфигурация пайплайна.
# Все пороги вынесены сюда: подстраиваем под данные без правки кода.

preprocess:
  white_balance: true       # gray-world баланс белого (снимает оливковый/тёмный оттенок)
  clahe: true               # локальное выравнивание контраста по L-каналу
  clahe_clip: 0.01
  denoise_median: 3         # медианный фильтр, 0 = выкл

segment:
  # Сегментация трёх фаз по отражательной способности + цвету.
  # Сульфид — самая яркая фаза; магнетит — серый средней яркости, нейтральный;
  # матрица — тёмная (панорамы) либо прочий фон. Оливковый оттенок — это
  # сульфид, а не матрица (см. segment_phases: not_olive-гейт убран именно
  # потому, что это допущение было перепутано местами).
  min_ore_area_px: 24       # удаляем связные компоненты мельче, px
  close_radius: 2           # морфологическое закрытие масок
  bright_percentile: 99.0   # запасной порог сульфида, если multiotsu не сработал
  chroma_max: 18.0          # магнетит нейтрален: хрома (Lab) не выше этого
  sulfide_min_L: 12.0       # абсолютный пол яркости сульфида (Lab L, 0..100)

talc:
  # Извлечение маски талька из синих контуров разметки (ground truth).
  blue_b_min: 90            # порог синего канала (0..255)
  blue_minus_r: 50          # B - R
  blue_minus_g: 50          # B - G
  cyan_b_min: 90            # часть разметки рисуют циан: высокий B
  cyan_g_min: 90            # …и высокий G
  cyan_minus_r: 50          # циан: B-R и G-R оба велики (R низкий)
  close_radius: 5           # закрыть разрывы в нарисованной линии
  # Детекция талька на новых снимках (без разметки) — тёмная фаза в матрице.
  detect_dark_frac: 0.35    # тальк темнее этой доли динамического диапазона матрицы

tiling:
  tile: 1024                # сторона тайла, px (нативное разрешение)
  overlap: 128              # перекрытие тайлов, px
  max_pixels: 150000000     # верх декодирования в память (draft-decode свыше)
  skip_empty: true          # пропускать пустые тёмные тайлы (нет рудных фаз)
  empty_bright_frac: 0.002  # тайл пустой, если ярких пикселей меньше этой доли
  ore_density_pct: 92       # глобальный перцентиль яркости: вес тайла = доля пикселей ярче него
  direct_max_pixels: 50000000  # <= это: один проход без тайлинга (крупный план);
                                # выше — тайловый путь (панорама). Разделение по
                                # реальным данным: crop ≤26 МП, панорама ≥126.5 МП.

rule:
  talc_threshold: 0.10          # тальк > 10% => оталькованная руда
  dominance_threshold: 0.50     # преобладание по площади сульфидов (мелкие > 50% => труднообог.)
  fine_min_confidence: 0.55     # ниже — помечаем «на проверку»
  liberation_radius_frac: 0.007 # радиус раскрытия зёрен = 0.7% длинной стороны (калибр.: порог 0.5, bal-acc 0.86, AUC 0.92)
